<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PC Market Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: #ffffff;
      --line: #d9e0ea;
      --text: #172033;
      --muted: #667085;
      --accent: #0f766e;
      --accent-soft: #d7f2ee;
      --warn: #a16207;
      --danger: #b42318;
      --blue: #2563eb;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
      -webkit-text-size-adjust: 100%;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .shell {
      width: min(1400px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 720;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .status {
      min-width: 220px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: right;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .metric {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .metric .value {
      margin-top: 6px;
      font-size: 24px;
      font-weight: 720;
      line-height: 1.1;
      white-space: nowrap;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 2fr) repeat(5, minmax(150px, 1fr));
      gap: 10px;
      align-items: end;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      margin-bottom: 14px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 5px;
    }

    input,
    select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      padding: 0 10px;
    }

    .summary {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 14px;
      margin-bottom: 14px;
      color: #344054;
      font-size: 14px;
      line-height: 1.75;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1140px;
      font-size: 13px;
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef3f8;
      color: #344054;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #f8fbfd;
    }

    .num {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .model {
      font-weight: 700;
      min-width: 240px;
      overflow-wrap: anywhere;
    }

    .muted {
      color: var(--muted);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      line-height: 1.4;
      white-space: nowrap;
    }

    .pill.high {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .pill.medium {
      background: #fef3c7;
      color: var(--warn);
    }

    .pill.low {
      background: #fee4e2;
      color: var(--danger);
    }

    .samples {
      display: grid;
      gap: 6px;
      min-width: 190px;
    }

    .lowest-price {
      display: grid;
      gap: 3px;
    }

    .sample-line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #344054;
      font-size: 12px;
      line-height: 1.35;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 960px) {
      .shell {
        width: min(100vw - 20px, 1400px);
        padding-top: 14px;
      }

      header {
        display: block;
      }

      .status {
        margin-top: 12px;
        text-align: left;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 620px) {
      h1 {
        font-size: 22px;
      }

      .metrics,
      .controls {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 16px, 1400px);
        padding: 12px 0 28px;
      }

      h1 {
        font-size: 21px;
      }

      .subtitle {
        font-size: 13px;
      }

      .status {
        width: 100%;
        min-width: 0;
        padding: 9px 10px;
      }

      .metric {
        padding: 11px;
      }

      .metric .value {
        font-size: 20px;
        white-space: normal;
      }

      .controls {
        padding: 10px;
        gap: 8px;
      }

      .summary {
        padding: 12px;
        font-size: 13px;
      }

      .table-wrap {
        overflow: visible;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      table,
      tbody,
      tr,
      td {
        display: block;
      }

      table {
        min-width: 0;
        border-collapse: separate;
        font-size: 13px;
      }

      thead {
        display: none;
      }

      tbody {
        display: grid;
        gap: 10px;
      }

      tbody tr {
        padding: 6px 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      tbody tr:hover {
        background: var(--surface);
      }

      td {
        display: grid;
        grid-template-columns: 88px minmax(0, 1fr);
        gap: 10px;
        padding: 8px 12px;
        border-bottom: 0;
      }

      td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.5;
      }

      .num {
        text-align: left;
        white-space: normal;
      }

      .model,
      .samples {
        min-width: 0;
      }

      .sample-line {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
      }

      .sample-line strong {
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>PC Market Dashboard</h1>
        <div class="subtitle">主要PCメーカーの過去モデルとフリマ価格サンプルを一覧できます。</div>
      </div>
      <div class="status">
        <div>Latest report: <strong>2026-05-18</strong></div>
        <div>Dashboard generated: <span id="generatedAt">-</span></div>
      </div>
    </header>

    <section class="metrics" aria-label="summary metrics">
      <div class="metric"><div class="label">メーカー</div><div class="value" id="makerCount">0</div></div>
      <div class="metric"><div class="label">モデル</div><div class="value" id="modelCount">0</div></div>
      <div class="metric"><div class="label">価格サンプル</div><div class="value" id="sampleCount">0</div></div>
      <div class="metric"><div class="label">最安値</div><div class="value" id="lowestPrice">-</div></div>
      <div class="metric"><div class="label">中央値レンジ</div><div class="value" id="priceRange">-</div></div>
    </section>

    <section class="controls" aria-label="filters">
      <div>
        <label for="searchInput">検索</label>
        <input id="searchInput" type="search" placeholder="メーカー、モデル、CPU、カテゴリ">
      </div>
      <div>
        <label for="reportSelect">調査日</label>
        <select id="reportSelect"></select>
      </div>
      <div>
        <label for="makerSelect">メーカー</label>
        <select id="makerSelect"></select>
      </div>
      <div>
        <label for="modelSelect">モデル</label>
        <select id="modelSelect"></select>
      </div>
      <div>
        <label for="confidenceSelect">確度</label>
        <select id="confidenceSelect">
          <option value="">すべて</option>
          <option value="high">high</option>
          <option value="medium">medium</option>
          <option value="low">low</option>
        </select>
      </div>
      <div>
        <label for="sortSelect">並び順</label>
        <select id="sortSelect">
          <option value="median-desc">中央値 高い順</option>
          <option value="median-asc">中央値 安い順</option>
          <option value="lowest-asc">最安値 安い順</option>
          <option value="maker-asc">メーカー順</option>
          <option value="samples-desc">サンプル数順</option>
        </select>
      </div>
    </section>

    <section class="summary" id="summaryText"></section>
    <div id="emptyState" class="empty" hidden>まだPC市場調査レポートがありません。調査実行後にこのページを再生成してください。</div>

    <section class="table-wrap" aria-label="pc market model table">
      <table>
        <thead>
          <tr>
            <th>メーカー</th>
            <th>モデル</th>
            <th>カテゴリ</th>
            <th class="num">最安値</th>
            <th class="num">中央値</th>
            <th class="num">価格レンジ</th>
            <th class="num">サンプル</th>
            <th>確度</th>
            <th>主な価格サンプル</th>
            <th>参照</th>
          </tr>
        </thead>
        <tbody id="modelRows"></tbody>
      </table>
    </section>

    <footer>
      公開情報を定点観測するための一覧です。価格は調査時点の表示価格または成約価格であり、状態、構成、送料、付属品により変動します。
    </footer>
  </div>

  <script>
    let dashboard = { generatedAt: null, reports: [] };
    let reports = [];
    const state = {
      reportIndex: 0,
      search: '',
      maker: '',
      modelKey: '',
      confidence: '',
      sort: 'median-desc',
    };

    const reportSelect = document.getElementById('reportSelect');
    const makerSelect = document.getElementById('makerSelect');
    const modelSelect = document.getElementById('modelSelect');
    const confidenceSelect = document.getElementById('confidenceSelect');
    const sortSelect = document.getElementById('sortSelect');
    const searchInput = document.getElementById('searchInput');

    function currentReport() {
      return reports[state.reportIndex] || null;
    }

    function flattenModels(report) {
      if (!report) return [];
      const rows = [];
      for (const maker of report.manufacturers || []) {
        for (const model of maker.models || []) {
          const stats = model.priceStats || {};
          const samples = model.marketPrices || [];
          const lowestSample = findLowestSample(samples);
          const lowest = minimumNumber([stats.minJPY, ...samples.map(sample => sample.priceJPY)]);
          rows.push({
            maker: maker.name || '-',
            modelName: model.modelName || model.brandSeries || '-',
            modelKey: `${maker.name || '-'}	${model.modelName || model.brandSeries || '-'}`,
            brandSeries: model.brandSeries || '',
            category: model.category || '-',
            releaseStatus: model.releaseStatus || '',
            officialUrl: model.officialUrl || '',
            confidence: model.confidence || '',
            specs: model.keySpecs || {},
            notes: Array.isArray(model.notes) ? model.notes.join(' ') : String(model.notes || ''),
            median: asNumber(stats.medianJPY),
            min: asNumber(stats.minJPY),
            max: asNumber(stats.maxJPY),
            lowest,
            lowestSample,
            sampleCount: asNumber(stats.sampleCount),
            samples,
          });
        }
      }
      return rows;
    }

    function refreshReportOptions() {
      reportSelect.innerHTML = '';
      if (!reports.length) {
        reportSelect.append(new Option('レポートなし', '0'));
        return;
      }
      reports.forEach((report, index) => {
        const label = `${report.reportDate || '-'} ${report.generatedFile ? '(' + report.generatedFile + ')' : ''}`;
        reportSelect.append(new Option(label, String(index)));
      });
    }

    function refreshMakerOptions(rows) {
      const makers = [...new Set(rows.map(row => row.maker).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ja'));
      makerSelect.innerHTML = '';
      makerSelect.append(new Option('すべて', ''));
      makers.forEach(maker => makerSelect.append(new Option(maker, maker)));
      if (!makers.includes(state.maker)) state.maker = '';
      makerSelect.value = state.maker;
    }

    function refreshModelOptions(rows) {
      const scopedRows = state.maker ? rows.filter(row => row.maker === state.maker) : rows;
      const models = scopedRows
        .map(row => ({
          key: row.modelKey,
          label: state.maker ? row.modelName : `${row.maker} - ${row.modelName}`,
        }))
        .sort((a, b) => a.label.localeCompare(b.label, 'ja'));
      modelSelect.innerHTML = '';
      modelSelect.append(new Option('すべて', ''));
      for (const model of models) {
        modelSelect.append(new Option(model.label, model.key));
      }
      if (!models.some(model => model.key === state.modelKey)) state.modelKey = '';
      modelSelect.value = state.modelKey;
    }

    function filteredRows() {
      const report = currentReport();
      let rows = flattenModels(report);
      if (state.maker) rows = rows.filter(row => row.maker === state.maker);
      if (state.modelKey) rows = rows.filter(row => row.modelKey === state.modelKey);
      if (state.confidence) rows = rows.filter(row => row.confidence === state.confidence);
      const query = state.search.trim().toLowerCase();
      if (query) {
        rows = rows.filter(row => {
          const text = [
            row.maker,
            row.modelName,
            row.brandSeries,
            row.category,
            row.releaseStatus,
            row.confidence,
            row.specs.cpu,
            row.specs.memory,
            row.specs.storage,
            row.notes,
          ].join(' ').toLowerCase();
          return text.includes(query);
        });
      }

      rows.sort((a, b) => {
        if (state.sort === 'lowest-asc') return nullLast(a.lowest, b.lowest);
        if (state.sort === 'median-asc') return nullLast(a.median, b.median);
        if (state.sort === 'maker-asc') return `${a.maker} ${a.modelName}`.localeCompare(`${b.maker} ${b.modelName}`, 'ja');
        if (state.sort === 'samples-desc') return b.sampleCount - a.sampleCount;
        return nullLast(b.median, a.median);
      });
      return rows;
    }

    function renderMetrics(allRows, rows) {
      const prices = rows.map(row => row.median).filter(value => value !== null);
      const lowestPrices = rows.map(row => row.lowest).filter(value => value !== null);
      const makers = new Set(rows.map(row => row.maker));
      const sampleTotal = rows.reduce((total, row) => total + (row.sampleCount || 0), 0);
      document.getElementById('makerCount').textContent = makers.size.toLocaleString('ja-JP');
      document.getElementById('modelCount').textContent = rows.length.toLocaleString('ja-JP');
      document.getElementById('sampleCount').textContent = sampleTotal.toLocaleString('ja-JP');
      document.getElementById('lowestPrice').textContent = lowestPrices.length ? yen(Math.min(...lowestPrices)) : '-';
      document.getElementById('priceRange').textContent = prices.length ? `${yen(Math.min(...prices))} - ${yen(Math.max(...prices))}` : '-';
      document.getElementById('emptyState').hidden = allRows.length > 0;
    }

    function renderSummary(report) {
      const summary = document.getElementById('summaryText');
      if (!report) {
        summary.textContent = 'レポートがありません。';
        return;
      }
      const scope = report.scope || {};
      const lookback = scope.modelLookbackYears || 5;
      const marketplaces = Array.isArray(scope.marketplaces) ? scope.marketplaces.join('、') : '-';
      const base = report.summary || '';
      summary.textContent = `${base} 対象モデルは過去${lookback}年、対象サイトは${marketplaces}です。`;
    }

    function renderRows(rows) {
      const tbody = document.getElementById('modelRows');
      tbody.innerHTML = '';
      for (const row of rows) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td data-label="メーカー">${escapeHtml(row.maker)}</td>
          <td class="model" data-label="モデル">
            ${escapeHtml(row.modelName)}
            <div class="muted">${escapeHtml([row.specs.cpu, row.specs.memory, row.specs.storage].filter(Boolean).join(' / '))}</div>
          </td>
          <td data-label="カテゴリ">${escapeHtml(row.category)}<div class="muted">${escapeHtml(row.releaseStatus)}</div></td>
          <td class="num" data-label="最安値">${lowestPriceCell(row)}</td>
          <td class="num" data-label="中央値">${yen(row.median)}</td>
          <td class="num" data-label="価格レンジ">${rangeText(row.min, row.max)}</td>
          <td class="num" data-label="サンプル">${row.sampleCount || 0}</td>
          <td data-label="確度">${confidencePill(row.confidence)}</td>
          <td data-label="主な価格サンプル">${sampleLines(row.samples)}</td>
          <td data-label="参照">${links(row)}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    function render() {
      const report = currentReport();
      const allRows = flattenModels(report);
      refreshMakerOptions(allRows);
      refreshModelOptions(allRows);
      const rows = filteredRows();
      renderSummary(report);
      renderMetrics(allRows, rows);
      renderRows(rows);
    }

    reportSelect.addEventListener('change', () => {
      state.reportIndex = Number(reportSelect.value || 0);
      state.maker = '';
      state.modelKey = '';
      render();
    });
    makerSelect.addEventListener('change', () => {
      state.maker = makerSelect.value;
      state.modelKey = '';
      render();
    });
    modelSelect.addEventListener('change', () => {
      state.modelKey = modelSelect.value;
      render();
    });
    confidenceSelect.addEventListener('change', () => {
      state.confidence = confidenceSelect.value;
      render();
    });
    sortSelect.addEventListener('change', () => {
      state.sort = sortSelect.value;
      render();
    });
    searchInput.addEventListener('input', () => {
      state.search = searchInput.value;
      render();
    });

    function asNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function minimumNumber(values) {
      const numbers = values.map(asNumber).filter(value => value !== null);
      return numbers.length ? Math.min(...numbers) : null;
    }

    function findLowestSample(samples) {
      if (!samples || !samples.length) return null;
      return samples.reduce((best, sample) => {
        const price = asNumber(sample.priceJPY);
        if (price === null) return best;
        if (!best || price < asNumber(best.priceJPY)) return sample;
        return best;
      }, null);
    }

    function nullLast(a, b) {
      if (a === null && b === null) return 0;
      if (a === null) return 1;
      if (b === null) return -1;
      return a - b;
    }

    function yen(value) {
      return value === null ? '-' : `${Math.round(value).toLocaleString('ja-JP')}円`;
    }

    function rangeText(min, max) {
      if (min === null && max === null) return '-';
      return `${yen(min)} - ${yen(max)}`;
    }

    function confidencePill(value) {
      const safe = escapeHtml(value || '-');
      const cls = ['high', 'medium', 'low'].includes(value) ? value : '';
      return `<span class="pill ${cls}">${safe}</span>`;
    }

    function lowestPriceCell(row) {
      if (row.lowest === null) return '<span class="muted">-</span>';
      const sample = row.lowestSample && asNumber(row.lowestSample.priceJPY) === row.lowest ? row.lowestSample : null;
      const meta = sample ? [sample.marketplace, sample.status].filter(Boolean).join(' / ') : '';
      return `<div class="lowest-price"><strong>${yen(row.lowest)}</strong>${meta ? `<span class="muted">${escapeHtml(meta)}</span>` : ''}</div>`;
    }

    function sampleLines(samples) {
      if (!samples || !samples.length) return '<span class="muted">-</span>';
      return `<div class="samples">${samples.slice(0, 3).map(sample => `
        <div class="sample-line">
          <span>${escapeHtml(sample.marketplace || '-')} / ${escapeHtml(sample.status || '-')}</span>
          <strong>${yen(asNumber(sample.priceJPY))}</strong>
        </div>
      `).join('')}</div>`;
    }

    function links(row) {
      const sample = (row.samples || []).find(item => item.sourceUrl);
      const parts = [];
      if (row.officialUrl) parts.push(`<a href="${escapeAttr(row.officialUrl)}" target="_blank" rel="noreferrer">公式</a>`);
      if (sample && sample.sourceUrl) parts.push(`<a href="${escapeAttr(sample.sourceUrl)}" target="_blank" rel="noreferrer">価格</a>`);
      return parts.length ? parts.join(' / ') : '<span class="muted">-</span>';
    }

    function formatDateTime(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('ja-JP');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('`', '&#096;');
    }

    async function loadDashboardData() {
      try {
        const response = await fetch('reports.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const loadedReports = await response.json();
        reports = Array.isArray(loadedReports) ? loadedReports : [];
        dashboard = {
          generatedAt: reports[0]?.generatedAt || new Date().toISOString(),
          reports,
        };
      } catch (error) {
        console.error('Failed to load reports.json', error);
        reports = [];
        dashboard = { generatedAt: null, reports };
      }
      document.getElementById('generatedAt').textContent = formatDateTime(dashboard.generatedAt);
      refreshReportOptions();
      render();
    }

    loadDashboardData();
  </script>
</body>
</html>
